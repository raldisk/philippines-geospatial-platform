<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380">
  <defs>
    <linearGradient id="reqGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f3e5f5"/><stop offset="100%" stop-color="#e1bee7"/></linearGradient>
    <linearGradient id="cacheHit" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8f5e9"/><stop offset="100%" stop-color="#c8e6c9"/></linearGradient>
    <linearGradient id="cacheMiss" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff3e0"/><stop offset="100%" stop-color="#ffe0b2"/></linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#bbdefb"/></linearGradient>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#546e7a"/>
    </marker>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="380" fill="#fafafa"/>

  <text x="600" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="700" fill="#37474f" text-anchor="middle">Serving Layer Request Flow — GET /geo/v1/h3/:resolution</text>

  <!-- Request -->
  <g filter="url(#shadow3)">
    <rect x="50" y="70" width="160" height="50" rx="8" fill="url(#reqGrad)" stroke="#ce93d8" stroke-width="2"/>
    <text x="130" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#6a1b9a" text-anchor="middle">HTTP Request</text>
    <text x="130" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#6a1b9a" text-anchor="middle">GET /geo/v1/h3/6?bbox=...</text>
  </g>

  <!-- Rate Limit -->
  <g filter="url(#shadow3)">
    <rect x="260" y="70" width="140" height="50" rx="8" fill="#fff" stroke="#78909c" stroke-width="2"/>
    <text x="330" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#37474f" text-anchor="middle">Rate Limit</text>
    <text x="330" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#37474f" text-anchor="middle">slowapi · 100/min</text>
  </g>

  <!-- Validation -->
  <g filter="url(#shadow3)">
    <rect x="450" y="70" width="140" height="50" rx="8" fill="#fff" stroke="#78909c" stroke-width="2"/>
    <text x="520" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#37474f" text-anchor="middle">Validation</text>
    <text x="520" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#37474f" text-anchor="middle">Bbox · Resolution · Indicator</text>
  </g>

  <!-- Cache -->
  <g filter="url(#shadow3)">
    <rect x="640" y="70" width="140" height="50" rx="8" fill="url(#cacheHit)" stroke="#81c784" stroke-width="2"/>
    <text x="710" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#2e7d32" text-anchor="middle">TTL Cache</text>
    <text x="710" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#2e7d32" text-anchor="middle">Key: h3::res::ind::bbox</text>
  </g>

  <!-- Cache Hit path -->
  <g filter="url(#shadow3)">
    <rect x="830" y="70" width="140" height="50" rx="8" fill="url(#cacheHit)" stroke="#81c784" stroke-width="2"/>
    <text x="900" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#2e7d32" text-anchor="middle">Cache Hit</text>
    <text x="900" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#2e7d32" text-anchor="middle">X-Cache: HIT</text>
  </g>

  <!-- Cache Miss path -->
  <g filter="url(#shadow3)">
    <rect x="830" y="160" width="140" height="50" rx="8" fill="url(#cacheMiss)" stroke="#ff8f00" stroke-width="2"/>
    <text x="900" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#e65100" text-anchor="middle">Cache Miss</text>
    <text x="900" y="198" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#e65100" text-anchor="middle">X-Cache: MISS</text>
  </g>

  <!-- DuckDB -->
  <g filter="url(#shadow3)">
    <rect x="640" y="160" width="140" height="50" rx="8" fill="url(#dbGrad)" stroke="#90caf9" stroke-width="2"/>
    <text x="710" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#1565c0" text-anchor="middle">DuckDB Spatial</text>
    <text x="710" y="198" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#1565c0" text-anchor="middle">Per-thread read conn</text>
  </g>

  <!-- PostgreSQL -->
  <g filter="url(#shadow3)">
    <rect x="450" y="160" width="140" height="50" rx="8" fill="url(#dbGrad)" stroke="#90caf9" stroke-width="2"/>
    <text x="520" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#1565c0" text-anchor="middle">PostgreSQL</text>
    <text x="520" y="198" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#1565c0" text-anchor="middle">Metadata + Registry</text>
  </g>

  <!-- Response -->
  <g filter="url(#shadow3)">
    <rect x="1020" y="70" width="140" height="50" rx="8" fill="url(#reqGrad)" stroke="#ce93d8" stroke-width="2"/>
    <text x="1090" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#6a1b9a" text-anchor="middle">HTTP Response</text>
    <text x="1090" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#6a1b9a" text-anchor="middle">JSON + Cache headers</text>
  </g>

  <!-- Arrows -->
  <line x1="210" y1="95" x2="260" y2="95" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="400" y1="95" x2="450" y2="95" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="590" y1="95" x2="640" y2="95" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Cache hit path -->
  <line x1="780" y1="95" x2="830" y2="95" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="970" y1="95" x2="1020" y2="95" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="995" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#78909c">hit</text>

  <!-- Cache miss path -->
  <line x1="710" y1="120" x2="710" y2="160" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="715" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#78909c">miss</text>
  <line x1="640" y1="185" x2="590" y2="185" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="615" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#78909c">registry</text>
  <line x1="900" y1="185" x2="900" y2="120" stroke="#546e7a" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="905" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="8" fill="#78909c">result</text>

  <!-- Bottom detail -->
  <rect x="50" y="260" width="1100" height="100" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="70" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#37474f">Serving Layer Guarantees</text>
  <text x="70" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#546e7a">
    <tspan x="70" dy="0">• Read-only: geo-service uses per-thread DuckDB read connections. No write path exposed via FastAPI.</tspan>
    <tspan x="70" dy="18">• Cache key includes all query params (resolution, indicator, bbox) — no cache poisoning risk. TTL = 3600s.</tspan>
    <tspan x="70" dy="18">• Philippine bounding box validation rejects any request outside the 116°–127°E / 4.5°–22°N envelope → HTTP 422.</tspan>
    <tspan x="70" dy="18">• Indicator whitelist regex ^[a-z_]{1,50}$ prevents SQL injection. Never passes raw user input to query string.</tspan>
  </text>
</svg>